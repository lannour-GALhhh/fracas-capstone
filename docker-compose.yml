services:

  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: fracas_db
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    expose:
      - "6379"

  backend:
    build: ./backend
    command: gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - ./backend:/backend
      - static_volume:/backend/staticfiles
      - media_volume:/backend/media
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('localhost', 8000)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build: ./backend
    container_name: celery_worker
    command: celery -A backend worker --loglevel=info
    env_file: .env
    volumes:
      - ./backend:/backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/backend/staticfiles 
      - media_volume:/backend/media
    depends_on:
      backend:
        condition:
          service_healthy


  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/frontend
      - frontend_node_modules:/frontend/node_modules
    expose:
      - "5173"
    command: npm run dev -- --host
    env_file: .env
    depends_on:
      backend:
        condition:
          service_healthy

volumes:
  postgres_data:
  static_volume:
  media_volume:
  frontend_node_modules: