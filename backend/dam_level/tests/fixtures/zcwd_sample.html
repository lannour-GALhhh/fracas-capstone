body

.noteColor{
    position: relative;
  
margin-top: 30%  
}




.circle
{
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%) scale(1.6);
width: 150px;
height: 150px;
border: 5px solid #fff;
box-shadow: 0 0 0 5px #4973ff;
border-radius: 50%;
overflow: hidden;
}

.wave
{
position: relative;
width: 100%;
height: 100%;
background: #4973ff;
border-radius: 50%;
box-shadow: inset 0 0 50px rgba(0,0,0.5);
}
.wave:before,
.wave:after
{
content: '';
position: absolute;
width: 250%; /*  higher = lower water $level*/
height: 175%; /* higher = lower water $level */
top: 0;
left: 50%;
transform: translate(-50%,-75%);
background: #000;
}
.wave:before
{
border-radius: 45%;
background: rgba(255,255,255,1);
animation: animate 10s linear infinite;
}
.wave:after
{
	border-radius: 45%;
background: rgba(255,255,255,.5);
animation: animate 5s linear infinite;
}
@keyframes animate
{
0%
{
 transform: translate(-50%,-70%) rotate(0deg);
}
100%
{
	 transform: translate(-50%,-72%) rotate(0deg);


}
}


.data
{
z-index: 99999;
   position: sticky;
	  margin-top: 15%;



 font-family: Arial, Helvetica, sans-serif;

}
</style>
